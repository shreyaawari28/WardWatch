# =============================================

# WardWatch - Application Configuration

# =============================================

# --- Server ---

server.port=${PORT:8080}

# =============================================

# DATABASE CONFIG (ENV-BASED - WORKS EVERYWHERE)

# =============================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================

# CONNECTION POOL (HIKARI) - FIXED

# =============================================

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.auto-commit=true

# 🔥 CRITICAL FIX FOR SUPABASE (PREPARED STATEMENT ERROR)

spring.datasource.hikari.data-source-properties.prepareThreshold=0

# =============================================

# JPA / HIBERNATE

# =============================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =============================================

# APPLICATION LOGIC CONFIG

# =============================================

# --- Bed Cleaning Auto-Release ---

bed.cleaning.duration.minutes=5
bed.cleaning.check.interval.ms=60000
bed.cleaning.alert.minutes=3

# --- Queue / Alerts ---

queue.discharge.alert.minutes=120
capacity.warning.threshold=2

# =============================================

# OPTIONAL (FOR DEBUG - ENABLE ONLY IF NEEDED)

# =============================================

# logging.level.org.springframework=INFO

# logging.level.com.wardwatch=DEBUG
